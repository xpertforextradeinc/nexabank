<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next-generation enterprise digital banking experience with interactive financial dashboards, smart card controls, and real-time transaction ledgers.">
    <meta property="og:description" content="Next-generation enterprise digital banking experience with interactive financial dashboards, smart card controls, and real-time transaction ledgers.">
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Diagnostic check to see if React actually mounts
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          root.innerHTML = '<div style="background:#000;color:#fff;padding:20px;font-family:sans-serif;"><h1>System Error</h1><p>The application script failed to initialize. This usually means a network error or a broken JavaScript bundle.</p><button onclick="location.reload()">Reload Page</button></div>';
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
